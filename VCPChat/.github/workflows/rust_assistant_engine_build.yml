name: Rust Assistant Engine Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'rust_assistant_engine/**'
      - '.github/workflows/rust_assistant_engine_build.yml'
  pull_request:
    paths:
      - 'rust_assistant_engine/**'
      - '.github/workflows/rust_assistant_engine_build.yml'

jobs:
  check:
    name: Check & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash
        working-directory: rust_assistant_engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_assistant_engine

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxfixes-dev \
            libxcb1-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test --no-fail-fast

  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash
        working-directory: rust_assistant_engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_assistant_engine

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxfixes-dev \
            libxcb1-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/assistant_core_server.exe dist/assistant_core_server-windows-x64.exe
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cp target/release/assistant_core_server dist/assistant_core_server-macos-x64
          else
            cp target/release/assistant_core_server dist/assistant_core_server-linux-x64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistant-core-${{ matrix.os }}
          path: rust_assistant_engine/dist/*
          if-no-files-found: error
