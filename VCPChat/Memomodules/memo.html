<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src * data: file:; connect-src *;">
    <title>VCP Memo 中心</title>
    <!-- 引入主题和样式 -->
    <link rel="stylesheet" href="../styles/themes.css">
    <link rel="stylesheet" href="../Forummodules/forum.css">
    <link rel="stylesheet" href="memo.css">
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="../vendor/katex.min.css">
    <script defer src="../vendor/katex.min.js"></script>
    <script defer src="../vendor/auto-render.min.js"></script>
    <script src="../vendor/marked.min.js"></script>
</head>
<body>
    <!-- 沉浸式顶部导航栏 -->
    <nav id="top-nav-bar" class="glass">
        <div class="nav-left">
            <div class="nav-title">VCP Memo</div>
            <div style="width: 1px; height: 20px; background: var(--glass-border); margin: 0 10px;"></div>
            <div class="search-container" style="display: flex; align-items: center; gap: 8px;">
                <input type="search" id="search-memos" class="search-glass" placeholder="🔍 搜索日记...">
                <button id="search-scope-btn" class="nav-icon-btn scope-toggle-btn" title="当前范围：文件夹内">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>
        </div>
        <div class="nav-right">
            <button id="create-memo-btn" class="jelly-btn" style="width: auto; padding: 8px 20px; font-size: 0.9rem;">
                + 新建日记
            </button>
            
            <div style="width: 1px; height: 20px; background: var(--glass-border); margin: 0 10px;"></div>
            
            <button id="minimize-memo-btn" class="nav-icon-btn" title="最小化">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button id="maximize-memo-btn" class="nav-icon-btn" title="最大化">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </button>
            <button id="close-memo-btn" class="nav-icon-btn" title="关闭" style="color: var(--danger-color); opacity: 1;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </nav>

    <div class="app-layout">
        <!-- 侧边栏：文件夹列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>文件夹</span>
                <button id="refresh-folders-btn" class="nav-icon-btn" title="刷新">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="folder-search-input" class="folder-search-input" placeholder="搜索文件夹...">
            </div>
            <div id="folder-list" class="folder-list">
                <!-- 文件夹项将由 JS 动态生成 -->
                <div class="folder-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    <span>加载中...</span>
                </div>
            </div>
            <div class="sidebar-footer" style="padding: 10px; border-top: 1px solid var(--glass-border);">
                <button id="manage-hidden-btn" class="glass-btn" style="width: 100%; justify-content: center;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    管理隐藏文件夹
                </button>
            </div>
        </aside>

        <!-- 主内容区：日记列表 -->
        <main class="main-content">
            <div class="content-header">
                <div id="current-folder-name" class="folder-title">所有日记</div>
                <div class="header-actions" style="display: flex; gap: 10px;">
                    <button id="batch-edit-btn" class="glass-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        批量管理
                    </button>
                    <div id="batch-actions" style="display: none; gap: 10px; align-items: center; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 10px; border: 1px solid var(--glass-border);">
                        <span id="selected-count" style="font-size: 0.85rem; color: var(--accent-color); font-weight: bold;">已选 0 项</span>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <span style="font-size: 0.75rem; color: var(--text-secondary);">移动到:</span>
                            <select id="batch-move-select" class="glass-input" style="padding: 2px 10px; font-size: 0.8rem; width: auto; margin-bottom: 0;">
                                <option value="">-- 选择文件夹 --</option>
                            </select>
                        </div>
                        <button id="batch-delete-btn" class="glass-btn danger" style="padding: 5px 12px; font-size: 0.85rem;">🗑️ 批量删除</button>
                        <button id="batch-workbench-btn" class="glass-btn primary" style="padding: 5px 12px; font-size: 0.85rem;">🛠️ 进入工作台</button>
                        <button id="cancel-batch-btn" class="nav-icon-btn" title="取消">&times;</button>
                    </div>
                </div>
            </div>
            <div id="memo-grid" class="memo-grid">
                <!-- 日记卡片将由 JS 动态生成 -->
            </div>
        </main>
    </div>

    <!-- 编辑器/详情 弹窗 -->
    <div id="editor-overlay" class="editor-overlay">
        <div class="editor-container">
            <div class="editor-header">
                <input type="text" id="editor-title" class="editor-title-input" placeholder="日记标题...">
                <div class="editor-header-actions">
                    <button id="toggle-preview-btn" class="nav-icon-btn editor-toggle-preview-btn" title="收纳渲染区" aria-label="收纳渲染区" aria-expanded="true">
                        <svg class="toggle-preview-icon collapse-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                            <line x1="20" y1="6" x2="20" y2="18"></line>
                        </svg>
                        <svg class="toggle-preview-icon expand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                            <line x1="4" y1="6" x2="4" y2="18"></line>
                        </svg>
                    </button>
                    <button id="close-editor-btn" class="nav-icon-btn" style="font-size: 1.5rem;">&times;</button>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="editor-textarea" class="editor-textarea" placeholder="开始记录你的灵感... (支持 Markdown)"></textarea>
                <div id="editor-preview" class="editor-preview markdown-body"></div>
            </div>
            <div class="editor-footer">
                <p id="editor-status" style="margin-right: auto; font-size: 0.8rem; color: var(--text-secondary);"></p>
                <button id="delete-memo-btn" class="glass-btn danger">🗑️ 删除</button>
                <button id="save-memo-btn" class="glass-btn primary">💾 保存修改</button>
            </div>
        </div>
    </div>

    <!-- 新建日记 弹窗 -->
    <div id="create-modal" class="modal" style="display: none; align-items: center; justify-content: center; position: fixed; top:0; left:0; right:0; bottom:0; z-index: 3000; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);">
        <div class="modal-glass-content glass" style="width: 90%; max-width: 600px; padding: 30px; border-radius: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📝 新建日记</h2>
                <button id="close-create-modal-btn" class="nav-icon-btn" style="font-size: 1.5rem;">&times;</button>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary);">日期</label>
                <input type="date" id="new-memo-date" class="glass-input" style="width: 100%;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary);">署名 <span style="opacity: 0.5; font-size: 0.8rem;">(maid)</span></label>
                <input type="text" id="new-memo-maid" class="glass-input" style="width: 100%;" placeholder="如：Nova">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary);">目标文件夹 <span style="opacity: 0.5; font-size: 0.8rem;">(folder, 可选，留空写入默认日记本)</span></label>
                <input type="text" id="new-memo-folder" class="glass-input" style="width: 100%;" placeholder="如：Nova的知识">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary);">文件名 <span style="opacity: 0.5; font-size: 0.8rem;">(可选，留空自动生成)</span></label>
                <input type="text" id="new-memo-filename" class="glass-input" style="width: 100%;" placeholder="自定义文件名，如：日记提示词哲学">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary);">标签 <span style="opacity: 0.5; font-size: 0.8rem;">(必选，逗号分隔)</span></label>
                <input type="text" id="new-memo-tags" class="glass-input" style="width: 100%;" placeholder="如：日记系统重构, RAG语义检索, 提示词工程">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary);">内容</label>
                <textarea id="new-memo-content" class="glass-input" style="width: 100%; min-height: 150px; resize: vertical;" placeholder="写下今天的故事..."></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="submit-new-memo-btn" class="jelly-btn" style="width: auto; padding: 10px 30px;">🚀 发布</button>
            </div>
        </div>
    </div>


    <!-- 自定义确认弹窗 -->
    <div id="custom-confirm-modal" class="modal" style="display: none; align-items: center; justify-content: center; position: fixed; top:0; left:0; right:0; bottom:0; z-index: 10100; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);">
        <div class="modal-glass-content glass" style="max-width: 450px; width: 90%; text-align: center; padding: 30px; border-radius: 20px;">
            <h3 id="confirm-title" style="margin-top: 0; margin-bottom: 15px; color: var(--accent-color);">确认操作</h3>
            <p id="confirm-message" style="margin-bottom: 25px; line-height: 1.6; color: var(--text-primary);"></p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="confirm-cancel-btn" class="glass-btn" style="width: auto; padding: 10px 30px;">取消</button>
                <button id="confirm-ok-btn" class="jelly-btn" style="width: auto; padding: 10px 30px; background: var(--danger-color);">确定</button>
            </div>
        </div>
    </div>

    <!-- 自定义提示弹窗 -->
    <div id="custom-alert-modal" class="modal" style="display: none; align-items: center; justify-content: center; position: fixed; top:0; left:0; right:0; bottom:0; z-index: 10100; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);">
        <div class="modal-glass-content glass" style="max-width: 400px; width: 90%; text-align: center; padding: 30px; border-radius: 20px;">
            <h3 id="alert-title" style="margin-top: 0; margin-bottom: 15px; color: var(--accent-color);">提示</h3>
            <p id="alert-message" style="margin-bottom: 25px; line-height: 1.6; color: var(--text-primary);"></p>
            <button id="alert-ok-btn" class="jelly-btn" style="width: auto; padding: 10px 40px;">确定</button>
        </div>
    </div>

    <!-- 隐藏文件夹管理弹窗 -->
    <div id="hidden-folders-modal" class="modal" style="display: none; align-items: center; justify-content: center; position: fixed; top:0; left:0; right:0; bottom:0; z-index: 3000; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);">
        <div class="modal-glass-content glass" style="width: 90%; max-width: 500px; padding: 30px; border-radius: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">🙈 隐藏文件夹管理</h2>
                <button id="close-hidden-modal-btn" class="nav-icon-btn" style="font-size: 1.5rem;">&times;</button>
            </div>
            <div id="hidden-folders-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                <!-- 隐藏文件夹列表将由 JS 动态生成 -->
            </div>
            <div style="display: flex; justify-content: flex-end;">
                <button id="hidden-modal-ok-btn" class="jelly-btn" style="width: auto; padding: 10px 40px;">完成</button>
            </div>
        </div>
    </div>

    <!-- 工作台发布后旧日记处理弹窗 -->
    <div id="post-publish-modal" class="modal" style="display: none; align-items: center; justify-content: center; position: fixed; top:0; left:0; right:0; bottom:0; z-index: 10200; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);">
        <div class="modal-glass-content glass" style="max-width: 500px; width: 90%; text-align: center; padding: 30px; border-radius: 20px;">
            <h3 style="margin-top: 0; margin-bottom: 10px; color: var(--accent-color);">✅ 整合日记发布成功</h3>
            <p style="margin-bottom: 20px; line-height: 1.6; color: var(--text-secondary); font-size: 0.9rem;">如何处理已引用的 <strong id="post-publish-count">0</strong> 篇原始日记？</p>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px;">
                <button id="post-publish-keep-btn" class="glass-btn" style="width: 100%; padding: 12px; justify-content: center; font-size: 0.95rem;">
                    📌 保留原位 — 不做任何变动
                </button>
                <button id="post-publish-archive-btn" class="glass-btn primary" style="width: 100%; padding: 12px; justify-content: center; font-size: 0.95rem;">
                    📦 归档到「已整理」文件夹
                </button>
                <button id="post-publish-delete-btn" class="glass-btn danger" style="width: 100%; padding: 12px; justify-content: center; font-size: 0.95rem;">
                    🗑️ 删除原始日记（不可撤销）
                </button>
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div id="context-menu" class="context-menu glass" style="display: none; position: fixed; z-index: 5000; min-width: 120px; padding: 5px 0; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
        <!-- 菜单项将由 JS 动态生成 -->
    </div>

    <!-- 批量操作悬浮条 -->
    <div id="batch-floating-bar" class="batch-floating-bar glass">
        <div class="batch-bar-header">
            <span id="batch-bar-count">已选择 0 项</span>
            <button id="batch-bar-clear" class="glass-btn" style="padding: 2px 8px; font-size: 0.7rem;">清空</button>
        </div>
        <div id="batch-bar-items" class="batch-bar-items">
            <!-- 选中项将在这里显示 -->
        </div>
    </div>

    <!-- 日记工作台 (Diary Workbench) 顶格模态框 -->
    <div id="workbench-overlay" class="workbench-overlay" style="display: none;">
        <div class="workbench-container glass">
            <div class="workbench-header">
                <div class="header-left">
                    <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        日记工作台
                    </h2>
                    <span id="workbench-count-tag" class="workbench-count-tag">共引用 0 篇日记</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="workbench-fullread-btn" class="glass-btn" style="padding: 6px 16px; font-size: 0.9rem;" title="在独立阅读窗口中查看所有引用日记的完整内容">
                        📖 完整阅读
                    </button>
                    <button id="close-workbench-btn" class="nav-icon-btn" style="font-size: 1.5rem;">&times;</button>
                </div>
            </div>
            
            <div class="workbench-body">
                <!-- 上半部分：参考区 -->
                <div class="workbench-reference-section">
                    <div class="section-header">
                        <span>📚 参考资料 (点击卡片可编辑/查看全文)</span>
                    </div>
                    <div id="workbench-reference-grid" class="workbench-reference-grid">
                        <!-- 参考卡片动态生成 -->
                    </div>
                </div>

                <!-- 下半部分：创作区 -->
                <div class="workbench-creation-section">
                    <div class="section-header">
                        <span>✍️ 整合创作</span>
                    </div>
                    <div class="creation-form glass">
                        <div class="form-row">
                            <div class="form-group">
                                <label>日期</label>
                                <input type="date" id="workbench-new-date" class="glass-input">
                            </div>
                            <div class="form-group">
                                <label>署名 / 目标文件夹 <span style="opacity: 0.5; font-size: 0.8rem;">(maid)</span></label>
                                <input type="text" id="workbench-new-folder" class="glass-input" placeholder="如：Nova 或 [Nova的知识]Nova">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>文件名 <span style="opacity: 0.5; font-size: 0.8rem;">(可选)</span></label>
                                <input type="text" id="workbench-new-filename" class="glass-input" placeholder="自定义文件名，留空自动生成">
                            </div>
                            <div class="form-group">
                                <label>标签 <span style="opacity: 0.5; font-size: 0.8rem;">(必选，逗号分隔)</span></label>
                                <input type="text" id="workbench-new-tags" class="glass-input" placeholder="如：整合记忆, 多源归纳">
                            </div>
                        </div>
                        <div class="form-group" style="flex: 1; display: flex; flex-direction: column;">
                            <label>整合内容</label>
                            <textarea id="workbench-new-content" class="glass-input" style="flex: 1; min-height: 200px; resize: none;" placeholder="基于上方参考资料，写下你的整合发现..."></textarea>
                        </div>
                        <div class="form-footer">
                            <button id="workbench-submit-btn" class="jelly-btn" style="width: auto; padding: 12px 40px;">🚀 发布整合日记</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pretext 文本布局引擎 -->
    <script type="module" src="../modules/renderer/pretext-bridge.js"></script>
    <script src="memo.js"></script>
    <script src="memo-graph.js"></script>
    <script src="memo-workbench.js"></script>

    <!-- 联想配置弹窗 (提升 z-index 并优化尺寸) -->
    <div id="assoc-config-modal" class="modal" style="display: none; align-items: center; justify-content: center; position: fixed; top:0; left:0; right:0; bottom:0; z-index: 6800; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);">
        <div class="modal-glass-content glass" style="width: 90%; max-width: 650px; padding: 35px; border-radius: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="margin: 0; display: flex; align-items: center; gap: 12px;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.125A5.002 5.002 0 0 0 14 18a5 5 0 0 0 5-5A3 3 0 0 0 12 5Z"/><path d="M12 18v-2a2 2 0 0 0-2-2H8"/><path d="M16 8a2 2 0 0 0-2 2v2"/></svg>
                    联想参数配置
                </h2>
                <button id="close-assoc-config-btn" class="nav-icon-btn" style="font-size: 1.5rem;">&times;</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                <div class="assoc-input-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <label style="font-size: 0.9rem; color: var(--secondary-text, var(--text-secondary));">联想深度 (Recall Count)</label>
                        <span id="label-k-value" style="color: var(--accent-color); font-weight: bold;">10</span>
                    </div>
                    <input type="range" id="input-assoc-k" min="1" max="100" value="10" class="glass-range" style="width: 100%;">
                    <p class="small-text" style="margin-top: 5px; color: var(--secondary-text, var(--text-secondary));">控制返回的关联日记数量上限</p>
                </div>

                <div class="assoc-input-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <label style="font-size: 0.9rem; color: var(--secondary-text, var(--text-secondary));">联想强度 (Tag Boost)</label>
                    </div>
                    <input type="text" id="input-assoc-boost" value="0.6+" class="glass-input" style="width: 100%; margin-bottom: 0;" placeholder="0.6 或 0.6+ (启用浪潮V8深度引擎)">
                    <p class="small-text" style="margin-top: 5px; color: var(--secondary-text, var(--text-secondary));">输入数值如 0.6，加 + 号启用浪潮V8测地线深度追忆引擎</p>
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label style="font-size: 0.9rem; color: var(--secondary-text, var(--text-secondary)); margin-bottom: 0;">搜索文件夹范围</label>
                    <input type="text" id="assoc-folder-search" placeholder="快速过滤文件夹..." class="glass-input" style="width: 200px; padding: 5px 12px; font-size: 0.8rem; margin-bottom: 0;">
                </div>
                <div id="assoc-folder-tags" class="folder-tag-cloud" style="max-height: 200px;">
                    <!-- 动态生成 -->
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--glass-border); padding-top: 25px; margin-top: 10px;">
                <button id="start-assoc-btn" class="jelly-btn" style="width: 100%; padding: 14px; font-weight: bold; font-size: 1.1rem;">🚀 开启视觉化联想</button>
            </div>
        </div>
    </div>

    <!-- 神经联想网络渲染界面 -->
    <div id="neural-graph-overlay" class="graph-overlay" style="display: none;">
        <!-- 神经加载过渡动画 -->
        <div id="neural-loading-overlay" class="neural-loading-overlay">
            <div class="loader-content">
                <div class="neural-core">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                    <svg class="brain-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.125A5.002 5.002 0 0 0 14 18a5 5 0 0 0 5-5A3 3 0 0 0 12 5Z"/><path d="M12 18v-2a2 2 0 0 0-2-2H8"/><path d="M16 8a2 2 0 0 0-2 2v2"/></svg>
                </div>
                <div class="loader-text">
                    <h3>正在深度溯源...</h3>
                    <p id="loader-source-name">神经网络正在遍历记忆星图</p>
                </div>
            </div>
        </div>

        <div class="graph-header glass">
            <div class="header-left">
                <button id="close-graph-btn" class="nav-icon-btn" title="退出联想视图">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="source-info">
                    <span class="label">当前源节点:</span>
                    <span id="graph-source-title" class="title">加载中...</span>
                </div>
            </div>
            <div class="header-right">
                <div class="graph-stats">
                    <span id="node-count-stat">0 关联节点</span>
                </div>
            </div>
        </div>
        
        <canvas id="neural-canvas"></canvas>

        <div id="node-detail-panel" class="node-detail-panel glass hidden">
            <div class="panel-header">
                <h3>节点详情</h3>
                <button id="close-panel-btn" class="nav-icon-btn">&times;</button>
            </div>
            <div class="panel-content">
                <div class="detail-section">
                    <h4 id="detail-title">文件名</h4>
                    <p id="detail-path" class="small-text"></p>
                </div>
                <div class="detail-section">
                    <div class="score-display">
                        <span class="score-label">关联度得分:</span>
                        <span id="detail-score" class="score-value">0.00</span>
                    </div>
                </div>
                <div class="detail-section">
                    <label>联想片段 / 完整文本:</label>
                    <div id="detail-chunks" class="chunks-list" style="white-space: pre-wrap; font-family: var(--font-family); line-height: 1.6; max-height: 400px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;"></div>
                </div>
                <div class="detail-section">
                    <label>匹配标签:</label>
                    <div id="detail-tags" class="tag-list"></div>
                </div>
            </div>
            <div class="panel-footer">
                <button id="node-edit-btn" class="glass-btn">✏️ 编辑内容</button>
                <button id="node-relink-btn" class="glass-btn primary">🧠 继续联想</button>
                <button id="node-delete-btn" class="glass-btn danger">🗑️ 删除</button>
                <button id="node-add-workbench-btn" class="glass-btn primary">🛠️ 加入工作台</button>
            </div>
        </div>

        <div class="graph-controls glass">
            <button id="reset-graph-btn" class="nav-icon-btn" title="重置视角">🎯</button>
            <div style="width: 1px; height: 16px; background: var(--glass-border);"></div>
            <button id="zoom-in-btn" class="nav-icon-btn" title="放大">+</button>
            <button id="zoom-out-btn" class="nav-icon-btn" title="缩小">-</button>
        </div>
    </div>
</body>
</html>
