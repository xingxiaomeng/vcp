# Exploration Tree: Education and Intelligence (Detterman, 2016)

tree:
  - id: N01
    type: question
    title: "What is the actual distribution of variance in academic achievement?"
    provenance: user
    timestamp: "2016"
    description: "Root question: who or what determines student achievement?"
    status: resolved
    support_level: explicit
    children:
      - id: N02
        type: decision
        title: "Adopt variance decomposition approach"
        provenance: user
        timestamp: "2016"
        choice: "Partition total variance into school-associated and student-associated components"
        evidence: [E01, E02, E03, E04, E05, E06, E07]
        status: resolved
        support_level: explicit
        children:
          - id: N03
            type: experiment
            title: "Thought experiment"
            provenance: user
            timestamp: "2016"
            description: "50 teachers by quality vs 50 classes by mean IQ"
            result: "Teacher correlation ≤ 0.32 (10% var); student ability ≤ 0.95 (90% var)"
            status: resolved
            support_level: explicit
          - id: N04
            type: dead_end
            title: "No field experiment with random teacher assignment"
            provenance: user
            timestamp: "2016"
            hypothesis: "Thought experiment is best available approximation"
            failure_mode: "Logistical impossibility of random teacher assignment"
            lesson: "Chingos & Whitehurst (2014) closest real-world analogue"
            status: resolved
            support_level: explicit
          - id: N05
            type: experiment
            title: "Coleman Report (1966)"
            provenance: user
            timestamp: "1966"
            result: "Schools 10-20%, teachers ~1%, students 80-90%"
            status: resolved
            support_level: explicit
          - id: N06
            type: dead_end
            title: "Large school effects expected but not found"
            provenance: user
            timestamp: "1966"
            hypothesis: "School quality would explain most variance"
            failure_mode: "Found opposite — within-school variance > between-school"
            lesson: "Conventional wisdom falsified"
            status: resolved
            support_level: explicit
          - id: N07
            type: experiment
            title: "Warsaw Natural Experiment (1978)"
            provenance: user
            timestamp: "1978"
            result: "Between-school variance: 2.1%; student variance: 98%"
            status: resolved
            support_level: explicit
          - id: N08
            type: decision
            title: "Even school effects are partly due to student distribution"
            provenance: user
            timestamp: "1978"
            choice: "Random student distribution shrinks school variance further"
            status: resolved
            support_level: explicit
          - id: N09
            type: experiment
            title: "College effects: Angoff & Johnson (1990)"
            provenance: user
            timestamp: "1990"
            result: "Student characteristics: 93% of GRE var; institution ≤ 7%"
            status: resolved
            support_level: explicit
          - id: N10
            type: dead_end
            title: "Why compete for 'best' colleges?"
            provenance: user
            timestamp: "2016"
            hypothesis: "Social network/signaling benefits"
            failure_mode: "Dale & Krueger: no earnings boost after ability control"
            lesson: "Credentialing explains prestige premium"
            status: resolved
            support_level: explicit
          - id: N11
            type: experiment
            title: "Twin study: Byrne et al. (2010)"
            provenance: user
            timestamp: "2010"
            result: "Teacher effects ≤ 8%"
            status: resolved
            support_level: explicit
          - id: N12
            type: experiment
            title: "Chingos & Whitehurst (2014)"
            provenance: user
            timestamp: "2014"
            result: "Teachers: 3%; school total: 9.2%; student: 90.8%"
            status: resolved
            support_level: explicit
